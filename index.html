<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <div class="sideBar">
            <div class="logo">
                <img src="img/Capet.svg" alt="">
            </div>
            <div class="explore">
                Explore
            </div>
            <div class="icons">
                <ul>
                    <li><img src="img/newIn.svg" alt="">New in</li>
                    <li><img src="img/clothing.svg" alt="">Clothing</li>
                    <li><img src="img/shoes.svg" alt="">Shoes</li>
                    <li><img src="img/accessories.svg" alt="">Accessories</li>
                    <li><img src="img/activewear.svg" alt="">ActiveWear</li>
                    <li><img src="img/giftsLiving.svg" alt="">Gifts & Living</li>
                    <li><img src="img/inspiration.svg" alt="">Inspiration</li>
                </ul>
              <div class="helpCenter">
                  <img src="img/helpCenter.svg" alt="">Help Center
              </div>
            </div>
        </div>
        <div class="content">
            <header>
                <div class="search">
                    <input class="search" type="search" placeholder="Search store">

                </div>
                <nav>
                    <ul>
                        <li>products</li>
                        <li>story</li>
                        <li>manufacturing</li>
                        <li>packaging</li>
                    </ul>
                    <div class="person">
                        <div class="basket">
                            <img src="img/basket.svg" alt="">
                        </div>
                        <div class="profile">
                            <img src="img/person.svg" alt="">
                        </div>
                    </div>

                </nav>


            </header>
            <main>
                <div class="w1">
                    <div><img src="img/w11.png" alt=""></div>
                    <div><img src="img/w12.png" alt=""></div>
                </div>
                <div class="w2">
                    <div class="w22"><img src="img/w21.png" alt=""></div>
                    <div><img src="img/w22.png" alt=""></div>
                </div>
                <div class="w3">
                    <div><img src="img/w31.png" alt=""></div>
                    <div><img src="img/w32.png" alt=""></div>
                </div>
                <div class="w4">
                    <div><img src="img/w41.png" alt=""></div>
                    <div><img src="img/w42.png" alt=""></div>
                </div>
            </main>

        </div>
    </div>
</body>
</html>
